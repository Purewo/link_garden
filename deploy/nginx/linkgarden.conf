# LinkGarden nginx site config.
#
# Install:
#   sudo install -m 0644 deploy/nginx/linkgarden.conf /etc/nginx/sites-available/linkgarden.conf
#   sudo ln -sf /etc/nginx/sites-available/linkgarden.conf /etc/nginx/sites-enabled/linkgarden.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# `scripts/deploy.sh` diffs this file against the host copy and refuses to
# proceed on drift unless --force-nginx is passed.

# --- Rate limit zones -------------------------------------------------------
# 10 requests/minute/IP on the login endpoint, with a burst of 5. The
# `burst=5 nodelay` lets the SPA's normal retry-on-401 path through while
# capping a credential-stuffing attacker at the steady-state rate.
limit_req_zone $binary_remote_addr zone=lg_login:10m rate=10r/m;

# --- HTTP -> HTTPS redirect -------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name linkgarden.example.com;

    # Keep the ACME http-01 challenge path reachable over plain HTTP so
    # certbot can renew without touching this server block.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main TLS server --------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name linkgarden.example.com;

    ssl_certificate     /etc/letsencrypt/live/linkgarden.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linkgarden.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:LG_SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 9.9.9.9 valid=300s;
    resolver_timeout 5s;

    root /srv/linkgarden/frontend/dist;
    index index.html;

    # 6 MiB = 5 MiB cover cap (MAX_COVER_BYTES) + ~1 MiB multipart slop.
    # Backend rejects oversize uploads with 413 cover_too_large; nginx rejects
    # *very* oversize uploads earlier with its own 413 to avoid bouncing them
    # through gunicorn.
    client_max_body_size 6m;
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # --- Security headers ---------------------------------------------------
    # CSP matches the locked decision in phase2-architecture §6:
    #   - script-src 'self'    : no third-party JS; admin token in localStorage
    #                            is XSS-readable so this is non-negotiable.
    #   - style-src 'self' 'unsafe-inline' : md-editor-v3 and highlight.js
    #                            theme inject inline styles.
    #   - img-src 'self' data: https: : covers served from /covers/, hero
    #                            placeholder data URI, optional external imgs
    #                            inside articles.
    #   - frame-ancestors 'none' : prevent click-jacking; we never embed.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # --- Compression --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # --- Login endpoint: rate-limited ---------------------------------------
    # Must come *before* the generic /api/ block so the more specific match
    # wins (`location =` is exact-match, highest priority).
    location = /api/v1/auth/login {
        limit_req zone=lg_login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # --- Generic API proxy --------------------------------------------------
    # Covers /api/health, /api/v1/*, and the legacy /api/* -> /api/v1/* 308
    # shim. The 308 is generated by FastAPI; nginx just forwards.
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering off;
    }

    # --- Cover assets -------------------------------------------------------
    # nginx serves cover files directly from the backend's upload tree. The
    # trailing slash on `alias` is required; the resolved path must remain
    # inside this directory (backend's atomic-write code asserts this on its
    # side too). `immutable` is safe because the SPA cache-busts the URL with
    # `?v=<timestamp>` on every cover update.
    location /covers/ {
        alias /srv/linkgarden/backend/src/app/static/covers/;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # --- Hashed Vite assets: long cache ------------------------------------
    # Vite emits content-hashed filenames under /assets/*, so they're safe to
    # cache aggressively. index.html stays short-cached so a deploy is visible
    # within seconds.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # --- SPA fallback -------------------------------------------------------
    # Every unknown path that isn't a real file or directory becomes a
    # client-side route, so vue-router takes over. Static files (favicon,
    # robots.txt, etc.) still get served directly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Operational niceties ----------------------------------------------
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Hide dotfiles that might accidentally land in dist/.
    location ~ /\.(?!well-known) {
        deny all;
    }
}
