# Pre-commit hooks for LinkGarden.
#
# Install:
#   pip install pre-commit  # or `uv tool install pre-commit`
#   pre-commit install
#
# Run on all files:
#   pre-commit run --all-files
#
# Hooks are split by surface so a frontend-only change never invokes a Python
# tool and vice versa. Heavy hooks (pyright, vue-tsc) are not in the default
# stage; they run in CI and can be invoked locally via `pre-commit run --hook-stage manual --all-files`.

repos:
  # --- generic hygiene ----------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.md|frontend/src/shared/api/schema\.d\.ts|frontend/openapi/schema\.json)$
      - id: end-of-file-fixer
        exclude: ^(frontend/src/shared/api/schema\.d\.ts|frontend/openapi/schema\.json)$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-yaml
        args: ['--unsafe']  # GitHub Actions YAML uses custom tags
      - id: check-toml
      - id: check-json
        exclude: ^frontend/openapi/schema\.json$  # generated; let the contract job own drift
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: detect-private-key

  # --- secret scanning ----------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # --- backend: ruff lint + format ---------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ruff (backend)
        args: ['--fix', '--exit-non-zero-on-fix']
        files: ^backend/.*\.py$
      - id: ruff-format
        name: ruff-format (backend)
        files: ^backend/.*\.py$

  # --- backend: pyright (manual stage, gated in CI) ----------------------
  - repo: local
    hooks:
      - id: pyright-backend
        name: pyright (backend, manual)
        entry: bash -c 'cd backend && uv run pyright'
        language: system
        pass_filenames: false
        stages: [manual]
        files: ^backend/.*\.py$

  # --- frontend: eslint flat + prettier (only changed files) -------------
  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -c 'cd frontend && pnpm exec eslint --max-warnings 0'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|vue)$
        # eslint resolves paths via tsconfig; pass the full file list as-is.
        pass_filenames: true

      - id: prettier-frontend
        name: prettier (frontend)
        entry: bash -c 'cd frontend && pnpm exec prettier --check'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|vue|css|md|json|yml|yaml)$
        exclude: ^frontend/(src/shared/api/schema\.d\.ts|openapi/schema\.json|pnpm-lock\.yaml)$
        pass_filenames: true

      - id: vue-tsc
        name: vue-tsc (frontend, manual)
        entry: bash -c 'cd frontend && pnpm typecheck'
        language: system
        pass_filenames: false
        stages: [manual]
        files: ^frontend/.*\.(ts|tsx|vue)$

  # --- guard: schema.d.ts is generated, never hand-edited ---------------
  - repo: local
    hooks:
      - id: forbid-edit-generated-schema
        name: forbid manual edits to generated API schema
        entry: bash -c 'echo "frontend/src/shared/api/schema.d.ts is generated by `pnpm gen:api`. Do not hand-edit." && exit 1'
        language: system
        files: ^frontend/src/shared/api/schema\.d\.ts$
